<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 鏡頭辨識與 Micro:bit 連動</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 20px;
        }
        .btn {
            padding: 10px 20px; font-size: 16px; cursor: pointer;
            border: none; border-radius: 5px; margin: 5px; color: white;
        }
        .btn-orange { background-color: #ff9800; }
        .btn-green { background-color: #4CAF50; }
        .btn-red { background-color: #f44336; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        
        /* 讓鏡頭和畫布可以重疊顯示 */
        .video-wrapper {
            position: relative;
            display: inline-block;
            margin: 20px auto;
            border: 3px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }
        video {
            display: block;
        }
        #draw-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }
        
        #result-box {
            margin: 10px auto; padding: 15px;
            background-color: #e3f2fd; border: 2px solid #2196F3;
            border-radius: 8px; font-size: 16px; color: #333;
            max-width: 640px; font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>AI 鏡頭辨識與 Micro:bit 連動</h1>
    
    <div>
        <button id="btn-connect" class="btn btn-orange">連接 Micro:bit</button>
        <span id="serial-status" style="color: gray; font-size: 14px; margin-left: 10px;">尚未連接</span>
    </div>

    <div style="margin-top: 15px;">
        <button id="btn-start" class="btn btn-green">開啟鏡頭並開始辨識</button>
        <button id="btn-stop" class="btn btn-red" disabled>停止</button>
    </div>

    <div class="video-wrapper">
        <video id="webcam" width="640" height="480" autoplay playsinline></video>
        <canvas id="draw-canvas" width="640" height="480"></canvas>
    </div>

    <canvas id="capture-canvas" width="640" height="480" style="display: none;"></canvas>

    <div id="result-box">等待開始...</div>

    <script>
        // --- 變數設定 ---
        const API_KEY = 's1Lu70khq7Ymo6iCuiFw'; // 提醒：發佈到公開網路後記得重置此 Key
        const WORKFLOW_URL = 'https://serverless.roboflow.com/harrys-workspace-wrtc8/workflows/detect-and-classify';
        
        // DOM 元素
        const video = document.getElementById('webcam');
        const captureCanvas = document.getElementById('capture-canvas');
        const captureCtx = captureCanvas.getContext('2d');
        const drawCanvas = document.getElementById('draw-canvas');
        const drawCtx = drawCanvas.getContext('2d');
        const resultBox = document.getElementById('result-box');
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const btnConnect = document.getElementById('btn-connect');
        const serialStatus = document.getElementById('serial-status');
        
        let stream = null;
        let inferenceInterval = null;
        let serialPort = null;
        let serialWriter = null;

        // --- 1. 連接 Micro:bit (Web Serial API) ---
        btnConnect.addEventListener('click', async () => {
            try {
                serialPort = await navigator.serial.requestPort();
                await serialPort.open({ baudRate: 115200 });
                const textEncoder = new TextEncoderStream();
                textEncoder.readable.pipeTo(serialPort.writable);
                serialWriter = textEncoder.writable.getWriter();
                
                serialStatus.innerText = "Micro:bit 已連接！";
                serialStatus.style.color = "green";
                btnConnect.innerText = "已連接";
                btnConnect.style.backgroundColor = "#4CAF50";
            } catch (err) {
                console.error("Serial 連接錯誤:", err);
                serialStatus.innerText = "連接失敗";
                serialStatus.style.color = "red";
            }
        });

        // --- 2. 開啟鏡頭與設定定時器 ---
        btnStart.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                
                btnStart.disabled = true;
                btnStop.disabled = false;
                resultBox.innerText = "辨識進行中...";

                // 每 1.2 秒呼叫一次 API (避免把免費額度刷太快)
                inferenceInterval = setInterval(captureAndPredict, 1200);
            } catch (err) {
                alert("無法開啟攝影機！請確保使用 localhost 且允許權限。");
            }
        });

        btnStop.addEventListener('click', () => {
            if (inferenceInterval) clearInterval(inferenceInterval);
            if (stream) stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
            btnStart.disabled = false;
            btnStop.disabled = true;
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height); // 清除畫布
            resultBox.innerText = "已停止辨識。";
        });

        // --- 3. 擷取畫面、呼叫 API 與畫框框 ---
        async function captureAndPredict() {
            // 將影像畫到隱藏畫布並轉成 Base64
            captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
            const dataUrl = captureCanvas.toDataURL('image/jpeg', 0.8);
            const base64Image = dataUrl.split(',')[1];

            try {
                // 呼叫 Roboflow API
                const response = await fetch(WORKFLOW_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        api_key: API_KEY,
                        inputs: {
                            "image": {"type": "base64", "value": base64Image}
                        }
                    })
                });

                const result = await response.json();
                
                // 清空上一秒畫的框框
                drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);

                // 嘗試從 Workflow 複雜的 JSON 結構中提取 predictions 陣列
                let predictions = [];
                if (result.outputs && result.outputs[0]) {
                    // 自動尋找包含 predictions 的那個節點
                    const keys = Object.keys(result.outputs[0]);
                    for (let key of keys) {
                        if (result.outputs[0][key] && result.outputs[0][key].predictions) {
                            predictions = result.outputs[0][key].predictions;
                            break;
                        }
                    }
                } else if (result.predictions) {
                    predictions = result.predictions;
                }

                // 顯示找到幾個物體
                resultBox.innerText = `畫面中找到 ${predictions.length} 個物體`;

                // --- 4. 開始畫框框與發送資料給 Micro:bit ---
                predictions.forEach(pred => {
                    // Roboflow 回傳的 x, y 通常是「中心點」，所以畫框時要換算回左上角
                    const x = pred.x - (pred.width / 2);
                    const y = pred.y - (pred.height / 2);
                    const width = pred.width;
                    const height = pred.height;
                    const className = pred.class;
                    const confidence = Math.round(pred.confidence * 100);

                    // 畫框框的設定
                    drawCtx.strokeStyle = "#00FF00"; // 綠色框線
                    drawCtx.lineWidth = 3;
                    drawCtx.strokeRect(x, y, width, height);

                    // 畫文字背景
                    drawCtx.fillStyle = "#00FF00";
                    drawCtx.fillRect(x, y - 25, width, 25);

                    // 畫文字 (類別與信心度)
                    drawCtx.fillStyle = "#000000"; // 黑色文字
                    drawCtx.font = "18px Arial";
                    drawCtx.fillText(`${className} ${confidence}%`, x + 5, y - 6);

                    // --- 如果信心度大於 80%，傳送類別名稱到 Micro:bit ---
                    if (serialWriter && pred.confidence > 0.8) {
                        serialWriter.write(className + '\n');
                        console.log(`已傳送至 Micro:bit: ${className}`);
                    }
                });

            } catch (error) {
                console.error("API 呼叫或繪圖錯誤:", error);
            }
        }
    </script>
</body>
</html>
