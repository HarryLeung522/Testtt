<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奶龍偵察器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2ecc71;
        }
        button.stop {
            background-color: #e74c3c;
        }
        button.stop:hover {
            background-color: #c0392b;
        }
        /* 讓 Canvas 能夠精準疊加在 Video 上方 */
        #video-container {
            position: relative;
            display: inline-block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }
        video {
            display: block;
            width: 640px;
            max-width: 100%;
            height: auto;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 讓滑鼠事件穿透 canvas */
        }
        #result-text {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #2980b9;
        }
        #raw-data {
            margin-top: 20px;
            padding: 15px;
            background-color: #2c3e50;
            color: #ecf0f1;
            text-align: left;
            border-radius: 8px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            overflow-x: auto;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <h1>奶龍偵察器 🦖</h1>
    <button id="start-btn">開始辨認</button>

    <div>
        <div id="video-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="overlay"></canvas>
        </div>
    </div>

    <div id="result-text">等待啟動...</div>

    <div id="raw-data">API 回傳資訊將顯示於此...</div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        const resultText = document.getElementById('result-text');
        const rawData = document.getElementById('raw-data');

        // 隱藏的 canvas，用來將影片畫面轉成圖片
        const captureCanvas = document.createElement('canvas');
        const captureCtx = captureCanvas.getContext('2d');

        let isDetecting = false;
        let detectionInterval;

        // 啟動/停止按鈕事件
        startBtn.addEventListener('click', async () => {
            if (!isDetecting) {
                await startCamera();
            } else {
                stopCamera();
            }
        });

        async function startCamera() {
            try {
                // 請求開啟鏡頭
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 640, height: 480 } });
                video.srcObject = stream;
                
                // 等待影片載入以獲取正確的長寬
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    captureCanvas.width = video.videoWidth;
                    captureCanvas.height = video.videoHeight;
                    
                    isDetecting = true;
                    startBtn.innerText = "停止辨認";
                    startBtn.classList.add("stop");
                    resultText.innerText = "正在辨識中...";
                    
                    // 開始每秒擷取畫面並傳送至 API
                    detectLoop();
                };
            } catch (err) {
                console.error(err);
                alert("無法存取鏡頭，請確認瀏覽器權限設定！");
            }
        }

        function stopCamera() {
            isDetecting = false;
            startBtn.innerText = "開始辨認";
            startBtn.classList.remove("stop");
            resultText.innerText = "已停止辨認";
            
            // 清空畫布與資訊
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 關閉鏡頭
            const stream = video.srcObject;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            video.srcObject = null;
        }

        async function detectLoop() {
            if (!isDetecting) return;

            // 1. 將目前的影片畫面畫到隱藏的 canvas 上
            captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
            
            // 2. 將畫面轉為 base64 格式 (去掉前面的 'data:image/jpeg;base64,')
            const imageDataUrl = captureCanvas.toDataURL('image/jpeg', 0.8);
            const base64Image = imageDataUrl.split(',')[1];

            try {
                // 3. 呼叫 Roboflow Workflows API
                const response = await fetch('https://serverless.roboflow.com/harrys-workspace-wrtc8/workflows/custom-workflow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        api_key: 's1Lu70khq7Ymo6iCuiFw',
                        inputs: {
                            "image": {
                                "type": "base64",
                                "value": base64Image
                            }
                        }
                    })
                });

                const result = await response.json();
                
                // 顯示原始回傳資訊
                rawData.innerText = JSON.stringify(result, null, 2);

                // 清空上一幀的綠色方框
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 解析預測結果
                // 注意：Workflow API 的回傳結構通常會包在 outputs 裡面，這裡嘗試抓取最常見的結構
                let predictions = [];
                if (result.outputs && result.outputs.length > 0) {
                    const outputObj = result.outputs[0];
                    // 尋找包含預測資料的陣列
                    for (const key in outputObj) {
                        if (outputObj[key] && outputObj[key].predictions) {
                            predictions = outputObj[key].predictions;
                            break;
                        } else if (Array.isArray(outputObj[key]) && outputObj[key].length > 0 && outputObj[key][0].confidence !== undefined) {
                            predictions = outputObj[key];
                            break;
                        }
                    }
                } else if (result.predictions) { // 備用：如果是標準 Inference API 格式
                    predictions = result.predictions;
                }

                // 4. 顯示文字結果與繪製綠色方框
                if (predictions && predictions.length > 0) {
                    let displayTexts = [];
                    
                    predictions.forEach(p => {
                        const confidence = (p.confidence * 100).toFixed(1);
                        const label = p.class || '未知物體';
                        displayTexts.push(`${label}: ${confidence}%`);

                        // Roboflow 通常回傳中心點(x,y)，需轉換為畫布所需的左上角座標
                        const startX = p.x - (p.width / 2);
                        const startY = p.y - (p.height / 2);

                        // 畫綠色方框
                        ctx.strokeStyle = '#00FF00';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(startX, startY, p.width, p.height);

                        // 畫背景標籤
                        ctx.fillStyle = '#00FF00';
                        ctx.fillRect(startX, startY - 25, ctx.measureText(`${label} ${confidence}%`).width + 20, 25);

                        // 畫文字
                        ctx.fillStyle = '#000000';
                        ctx.font = 'bold 16px Arial';
                        ctx.fillText(`${label} ${confidence}%`, startX + 5, startY - 7);
                    });

                    resultText.innerText = displayTexts.join(' | ');
                } else {
                    resultText.innerText = "未發現奶龍";
                }

            } catch (error) {
                console.error("API 請求失敗:", error);
                resultText.innerText = "連線失敗或 API 錯誤";
            }

            // 5. 設定延遲後抓取下一幀 (設定 500 毫秒即每秒 2 幀，避免把 API 額度瞬間耗盡)
            setTimeout(detectLoop, 500);
        }
    </script>
</body>
</html>
