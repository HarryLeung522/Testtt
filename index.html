<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roboflow 鏡頭辨識網站</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 20px;
        }
        .video-container {
            margin: 20px auto;
            border: 3px solid #333;
            border-radius: 8px;
            overflow: hidden;
            display: inline-block;
            background-color: #000;
        }
        video {
            display: block;
        }
        .btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin: 5px;
            color: white;
        }
        .btn-green { background-color: #4CAF50; }
        .btn-red { background-color: #f44336; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        
        #result-box {
            margin: 20px auto;
            padding: 15px;
            background-color: #e3f2fd;
            border: 2px solid #2196F3;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            max-width: 800px;
            text-align: left;
            /* 讓長篇 JSON 能夠自動換行與捲動 */
            white-space: pre-wrap; 
            word-wrap: break-word;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <h1>Roboflow 鏡頭辨識</h1>
    
    <div>
        <button id="btn-start" class="btn btn-green">開啟鏡頭並開始辨識</button>
        <button id="btn-stop" class="btn btn-red" disabled>停止辨識</button>
    </div>

    <div class="video-container">
        <video id="webcam" width="640" height="480" autoplay playsinline></video>
    </div>

    <canvas id="capture-canvas" width="640" height="480" style="display: none;"></canvas>

    <h3>辨識結果 (JSON):</h3>
    <div id="result-box">等待開始...</div>

    <script>
        // --- 變數設定 ---
        const API_KEY = "s1Lu70khq7Ymo6iCuiFw";
        const WORKFLOW_URL = "https://serverless.roboflow.com/harrys-workspace-wrtc8/workflows/detect-and-classify";
        
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('capture-canvas');
        const ctx = canvas.getContext('2d');
        const resultBox = document.getElementById('result-box');
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        
        let stream = null;
        let inferenceInterval = null;

        // --- 1. 開啟鏡頭與開始辨識 ---
        btnStart.addEventListener('click', async () => {
            try {
                // 請求攝影機權限
                stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                
                btnStart.disabled = true;
                btnStop.disabled = false;
                resultBox.innerText = "鏡頭已開啟，開始呼叫 API...";

                // 設定每 1 秒 (1000毫秒) 執行一次擷取與辨識
                // (注意：如果設定太快，會大量消耗 Roboflow 的 API 額度！)
                inferenceInterval = setInterval(captureAndPredict, 1000);
                
            } catch (err) {
                console.error("無法開啟攝影機:", err);
                resultBox.innerText = "無法開啟攝影機，請檢查權限設定。";
            }
        });

        // --- 2. 停止辨識 ---
        btnStop.addEventListener('click', () => {
            if (inferenceInterval) {
                clearInterval(inferenceInterval);
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            video.srcObject = null;
            btnStart.disabled = false;
            btnStop.disabled = true;
            resultBox.innerText = "辨識已停止。";
        });

        // --- 3. 擷取畫面並傳送給 API ---
        async function captureAndPredict() {
            // 將 video 目前的畫面畫到隱藏的 canvas 上
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 將 canvas 畫面轉換為 Base64 格式 (品質設為 0.8 以壓縮大小，加快傳輸速度)
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            
            // dataUrl 格式為 "data:image/jpeg;base64,/9j/4AAQSk..."
            // Roboflow API 只需要後面的 Base64 字串，所以我們把它切開
            const base64Image = dataUrl.split(',')[1];

            // 組合 API 需要的 Payload 格式
            const payload = {
                "api_key": API_KEY,
                "inputs": {
                    "image": {
                        "type": "base64",
                        "value": base64Image
                    }
                }
            };

            try {
                // 發送 POST 請求到 Roboflow
                const response = await fetch(WORKFLOW_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                // 將回傳的 JSON 資料格式化並顯示在下方的 result-box 中
                resultBox.innerText = JSON.stringify(data, null, 2);

            } catch (error) {
                console.error("API 呼叫失敗:", error);
                resultBox.innerText = "API 呼叫失敗，請檢查網路狀態或開發者工具(F12)。";
            }
        }
    </script>
</body>
</html>
