<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奶龍偵察器 V3 - 即時串流版</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* 狀態指示列 */
        #detection-status {
            font-size: 20px;
            font-weight: bold;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            background-color: #e5e7eb; /* 預設灰色 */
            color: #374151;
            transition: all 0.3s ease;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: auto;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }
        
        video {
            width: 100%;
            height: auto;
            display: block;
        }

        #overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .controls { margin: 20px 0; }
        button { background-color: #6366f1; color: white; border: none; padding: 12px 24px; font-size: 18px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; width: 200px; }
        button:hover { filter: brightness(0.9); }
        button.stop-btn { background-color: #ef4444; } /* 停止按鈕變紅色 */
        
        #result-container { text-align: left; background: #282c34; color: #abb2bf; padding: 15px; border-radius: 8px; overflow-x: auto; height: 200px; margin-top: 20px; font-size: 14px; }
        .log-info { margin: 10px 0; color: #666; font-size: 14px;}
        
        #snapshot-canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐲 奶龍偵察器 V3</h1>
    
    <div id="detection-status">狀態：等待開始...</div>

    <div class="video-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="overlay-canvas"></canvas>
    </div>
    <p style="margin-top:5px; color:#555;">USB Camera / Web camera</p>

    <div class="controls">
        <button id="toggle-btn">開始即時辨認</button>
        <div id="log" class="log-info">系統就緒。</div>
    </div>

    <hr>
    
    <h3>API 即時回傳資訊：</h3>
    <pre id="result-container">尚未有資料...</pre>
</div>

<canvas id="snapshot-canvas"></canvas>

<script>
    const video = document.getElementById('webcam');
    const overlayCanvas = document.getElementById('overlay-canvas');
    const overlayCtx = overlayCanvas.getContext('2d');
    const snapshotCanvas = document.getElementById('snapshot-canvas');
    const snapshotCtx = snapshotCanvas.getContext('2d');
    const toggleBtn = document.getElementById('toggle-btn');
    const resultContainer = document.getElementById('result-container');
    const logDiv = document.getElementById('log');
    const detectionStatus = document.getElementById('detection-status');

    const API_KEY = "s1Lu70khq7Ymo6iCuiFw";
    const API_URL = "https://serverless.roboflow.com/harrys-workspace-wrtc8/workflows/custom-workflow";

    let isDetecting = false; // 控制是否正在進行偵測的開關

    // 1. 初始化鏡頭
    async function initWebcam() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            
            video.addEventListener('loadedmetadata', () => {
                resizeCanvas();
            });
            window.addEventListener('resize', resizeCanvas);
        } catch (err) {
            console.error("無法開啟鏡頭: ", err);
            logDiv.innerText = "錯誤：無法開啟鏡頭，請檢查權限。";
        }
    }

    function resizeCanvas() {
        // 使用影片的原始比例來設定畫布大小，確保繪圖精準度
        overlayCanvas.width = video.videoWidth;
        overlayCanvas.height = video.videoHeight;
        
        // 為了讓 CSS 縮放不影響畫布，我們設定畫布的 style width/height 與視訊相同
        overlayCanvas.style.width = video.clientWidth + 'px';
        overlayCanvas.style.height = video.clientHeight + 'px';
    }

    // 2. 更新狀態列 UI
    function updateStatusUI(predictions) {
        if (predictions && predictions.length > 0) {
            detectionStatus.innerText = `🟢 發現目標！偵測到 ${predictions.length} 個物件`;
            detectionStatus.style.backgroundColor = '#d1fae5'; // 淺綠色背景
            detectionStatus.style.color = '#065f46'; // 深綠色文字
        } else {
            detectionStatus.innerText = `🔴 畫面中沒有偵測到目標`;
            detectionStatus.style.backgroundColor = '#fee2e2'; // 淺紅色背景
            detectionStatus.style.color = '#991b1b'; // 深紅色文字
        }
    }

    // 3. 在畫布上繪製偵測結果
    function drawResults(predictions) {
        overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

        if (!predictions || predictions.length === 0) return;

        predictions.forEach(pred => {
            // 因為現在畫布大小直接等於 video 原始大小，所以不需額外算比例
            const width = pred.width;
            const height = pred.height;
            const x = pred.x - width / 2;
            const y = pred.y - height / 2;

            const className = pred.class || "未知";
            const confidencePercent = (pred.confidence * 100).toFixed(1);

            // 繪製框
            overlayCtx.strokeStyle = "#00FF00";
            overlayCtx.lineWidth = Math.max(2, overlayCanvas.width / 150); // 根據解析度動態調整線條粗細
            overlayCtx.strokeRect(x, y, width, height);

            // 繪製文字
            overlayCtx.fillStyle = "rgba(0, 255, 0, 0.7)";
            overlayCtx.font = `${Math.max(16, overlayCanvas.width / 30)}px sans-serif`;
            const textWidth = overlayCtx.measureText(`${className} (${confidencePercent}%)`).width;
            overlayCtx.fillRect(x, y - (overlayCanvas.width / 30), textWidth + 10, overlayCanvas.width / 30);

            overlayCtx.fillStyle = "#FFFFFF";
            overlayCtx.fillText(`${className} (${confidencePercent}%)`, x + 5, y - 5);
        });
    }

    // 4. 執行單次辨識的函數
    async function performDetection() {
        if (!isDetecting) return; // 如果已經按下停止，就中斷執行

        logDiv.innerText = `最後更新時間：${new Date().toLocaleTimeString()} ...`;

        snapshotCanvas.width = video.videoWidth;
        snapshotCanvas.height = video.videoHeight;
        snapshotCtx.drawImage(video, 0, 0, snapshotCanvas.width, snapshotCanvas.height);

        const imageData = snapshotCanvas.toDataURL('image/jpeg', 0.8);
        const base64Image = imageData.split(',')[1];

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    api_key: API_KEY,
                    inputs: { "image": { "type": "base64", "value": base64Image } }
                })
            });

            const result = await response.json();
            resultContainer.innerText = JSON.stringify(result, null, 2);

            let predictions = [];
            if (result.output && result.output.predictions) {
                predictions = result.output.predictions;
            } else if (result.predictions) {
                predictions = result.predictions;
            }

            drawResults(predictions);
            updateStatusUI(predictions); // 更新最上方的狀態列

        } catch (error) {
            console.error("API 請求失敗:", error);
            logDiv.innerText = "請求失敗: " + error.message;
        }

        // 核心邏輯：如果還在偵測狀態，等待 0.5 秒 (500 毫秒) 後再次執行
        if (isDetecting) {
            setTimeout(performDetection, 500);
        }
    }

    // 5. 按鈕切換邏輯 (開始 / 停止)
    toggleBtn.addEventListener('click', () => {
        if (isDetecting) {
            // 停止偵測
            isDetecting = false;
            toggleBtn.innerText = "開始即時辨認";
            toggleBtn.classList.remove("stop-btn");
            logDiv.innerText = "偵測已停止。";
            
            // 恢復初始狀態
            detectionStatus.innerText = "狀態：已停止";
            detectionStatus.style.backgroundColor = "#e5e7eb";
            detectionStatus.style.color = "#374151";
            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        } else {
            // 開始偵測
            isDetecting = true;
            toggleBtn.innerText = "停止辨認";
            toggleBtn.classList.add("stop-btn");
            logDiv.innerText = "開始連線 API...";
            detectionStatus.innerText = "🟡 正在進行第一次辨識...";
            detectionStatus.style.backgroundColor = "#fef08a"; // 黃色準備狀態
            detectionStatus.style.color = "#854d0e";
            
            performDetection(); // 啟動迴圈
        }
    });

    // 啟動鏡頭
    initWebcam();
</script>

</body>
</html>
