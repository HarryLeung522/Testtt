<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roboflow 鏡頭辨識</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 20px;
        }
        .video-container {
            margin: 20px auto;
            border: 3px solid #333;
            border-radius: 8px;
            overflow: hidden;
            display: inline-block;
            background-color: #000;
        }
        video { display: block; }
        .btn {
            padding: 10px 20px; font-size: 16px; cursor: pointer;
            border: none; border-radius: 5px; margin: 5px; color: white;
        }
        .btn-green { background-color: #4CAF50; }
        .btn-red { background-color: #f44336; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        
        #result-box {
            margin: 20px auto; padding: 15px;
            background-color: #e3f2fd; border: 2px solid #2196F3;
            border-radius: 8px; font-size: 14px; color: #333;
            max-width: 800px; text-align: left;
            white-space: pre-wrap; word-wrap: break-word;
            max-height: 400px; overflow-y: auto;
        }
    </style>
</head>
<body>

    <h1>鏡頭即時辨識 (Roboflow)</h1>
    
    <div>
        <button id="btn-start" class="btn btn-green">開啟鏡頭並辨識</button>
        <button id="btn-stop" class="btn btn-red" disabled>停止</button>
    </div>

    <div class="video-container">
        <video id="webcam" width="640" height="480" autoplay playsinline></video>
    </div>

    <canvas id="capture-canvas" width="640" height="480" style="display: none;"></canvas>

    <h3>模型回傳結果 (JSON):</h3>
    <div id="result-box">等待開始...</div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('capture-canvas');
        const ctx = canvas.getContext('2d');
        const resultBox = document.getElementById('result-box');
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        
        let stream = null;
        let inferenceInterval = null;

        // 1. 開啟鏡頭
        btnStart.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                
                btnStart.disabled = true;
                btnStop.disabled = false;
                resultBox.innerText = "鏡頭已開啟，每 1.5 秒呼叫一次 API...\n(請確保你是用 localhost 或 Live Server 開啟此網頁)";

                // 每 1500 毫秒 (1.5秒) 執行一次擷取與發送 API
                inferenceInterval = setInterval(captureAndPredict, 1500);
                
            } catch (err) {
                console.error("無法開啟攝影機:", err);
                resultBox.innerText = "無法開啟攝影機！請確保：\n1. 網頁是透過 Live Server (localhost) 開啟。\n2. 瀏覽器有允許攝影機權限。";
            }
        });

        // 2. 停止鏡頭
        btnStop.addEventListener('click', () => {
            if (inferenceInterval) clearInterval(inferenceInterval);
            if (stream) stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
            btnStart.disabled = false;
            btnStop.disabled = true;
            resultBox.innerText = "已停止辨識。";
        });

        // 3. 擷取畫面並使用你提供的 Fetch 呼叫 API
        async function captureAndPredict() {
            // 將 video 畫到隱藏的 canvas 上
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 轉換為 Base64 格式 (壓縮品質 0.8)
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            
            // 裁掉 "data:image/jpeg;base64," 前綴，只留純編碼
            const base64Image = dataUrl.split(',')[1];

            try {
                // --- 這裡就是你剛剛提供的程式碼，我幫你把 inputs 改成了 base64 ---
                const response = await fetch('https://serverless.roboflow.com/harrys-workspace-wrtc8/workflows/detect-and-classify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        api_key: 's1Lu70khq7Ymo6iCuiFw',
                        inputs: {
                            "image": {"type": "base64", "value": base64Image}
                        }
                    })
                });

                const result = await response.json();
                
                // 顯示結果
                resultBox.innerText = JSON.stringify(result, null, 2);

            } catch (error) {
                console.error("API 呼叫錯誤:", error);
                resultBox.innerText = "API 呼叫失敗，請檢查網路或 F12 控制台。";
            }
        }
    </script>
</body>
</html>
