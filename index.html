<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奶龍偵察器</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        video { width: 100%; max-width: 640px; border-radius: 10px; background: #000; }
        .controls { margin: 20px 0; }
        button { background-color: #6366f1; color: white; border: none; padding: 12px 24px; font-size: 18px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #4f46e5; }
        button:disabled { background-color: #ccc; }
        #result-container { text-align: left; background: #282c34; color: #abb2bf; padding: 15px; border-radius: 8px; overflow-x: auto; min-height: 100px; margin-top: 20px; }
        .status { margin: 10px 0; color: #666; font-style: italic; }
        canvas { display: none; } /* 隱藏截圖用的畫布 */
    </style>
</head>
<body>

<div class="container">
    <h1>🐲 奶龍偵察器</h1>
    <p>模型類型: Roboflow 3.0 Object Detection (Fast)</p>

    <div class="video-section">
        <video id="webcam" autoplay playsinline></video>
        <p>USB Camera / Web camera</p>
    </div>

    <div class="controls">
        <button id="capture-btn">開始辨認</button>
        <div id="status" class="status">等待操作...</div>
    </div>

    <hr>
    
    <h3>辨認結果 / 網站回傳資訊：</h3>
    <pre id="result-container">尚未有資料...</pre>
</div>

<canvas id="snapshot"></canvas>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('snapshot');
    const captureBtn = document.getElementById('capture-btn');
    const resultContainer = document.getElementById('result-container');
    const statusDiv = document.getElementById('status');

    const API_KEY = "s1Lu70khq7Ymo6iCuiFw";
    const API_URL = "https://serverless.roboflow.com/harrys-workspace-wrtc8/workflows/custom-workflow";

    // 1. 初始化鏡頭
    async function initWebcam() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } // 優先使用後置鏡頭（如果是手機）
            });
            video.srcObject = stream;
        } catch (err) {
            console.error("無法開啟鏡頭: ", err);
            statusDiv.innerText = "錯誤：無法開啟鏡頭，請檢查權限。";
        }
    }

    // 2. 進行識別
    captureBtn.addEventListener('click', async () => {
        captureBtn.disabled = true;
        statusDiv.innerText = "偵測中，請稍候...";
        resultContainer.innerText = "正在呼叫 Roboflow API...";

        // 從視訊擷取當前畫面
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        // 將圖片轉為 Base64
        const imageData = canvas.toDataURL('image/jpeg', 0.8);
        // 去掉 data:image/jpeg;base64, 標頭，僅保留純 base64 字串
        const base64Image = imageData.split(',')[1];

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    api_key: API_KEY,
                    inputs: {
                        "image": {
                            "type": "base64",
                            "value": base64Image
                        }
                    }
                })
            });

            const result = await response.json();
            console.log(result);
            
            // 格式化顯示結果
            resultContainer.innerText = JSON.stringify(result, null, 2);
            statusDiv.innerText = "辨認完成！";

        } catch (error) {
            console.error("API 請求失敗:", error);
            resultContainer.innerText = "請求失敗: " + error.message;
            statusDiv.innerText = "辨認發生錯誤。";
        } finally {
            captureBtn.disabled = false;
        }
    });

    // 啟動鏡頭
    initWebcam();
</script>

</body>
</html>
